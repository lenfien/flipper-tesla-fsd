# Tesla ISO - DNS 隔离方案 v1.0
# 策略: 黑名单模式 - 默认放行所有域名, 仅 sinkhole tesla 四个根域
# 例外通过 /etc/dnsmasq.d/tesla_iso.conf 维护(由 web 自动重写)

# --- 上游 DNS (国内公共 DNS, 走 dnsmasq 转发) ---
server=114.114.114.114
server=223.5.5.5
server=119.29.29.29

# --- 日志 (供 web 待审页扫描车机查询历史) ---
log-queries
log-facility=/tmp/dns.log

# --- 缓存 TTL 控制 ---
# 强制下游客户端最多缓存 60 秒
# 防止车机切换 WiFi 后旧缓存窗口期持续过长
max-ttl=60
min-cache-ttl=0
neg-ttl=10

# --- Tesla 全量 sinkhole (4 个根域 × IPv4 + IPv6) ---
# 任何 *.tesla.cn / *.tesla.com / *.teslamotors.com / *.tesla.services
# IPv4: 解析到 127.0.0.1
# IPv6: 解析到 :: (未指定地址,等价于 IPv4 的 0.0.0.0,客户端立即放弃连接)
# 例外在 dnsmasq.d/tesla_iso.conf 中
# (dnsmasq 最长后缀匹配规则: 例外的子域会胜过这里的根域 sinkhole)
#
# 双层防护:
#   L1 (DNS): 这里的 sinkhole, 客户端解析直接拿到无效地址
#   L2 (网络): firewall.user 里 ip6tables FORWARD DROP, 即使 DNS 漏了
#              所有 IPv6 forward 流量都会被 drop, 二次保险
#
# 当前 Tesla 这几个域名没公开的 IPv6 AAAA 记录, 但任何时候可能开,
# 主动 sinkhole 比依赖 Tesla 不开 IPv6 更稳.
address=/tesla.cn/127.0.0.1
address=/tesla.com/127.0.0.1
address=/teslamotors.com/127.0.0.1
address=/tesla.services/127.0.0.1
address=/tesla.cn/::
address=/tesla.com/::
address=/teslamotors.com/::
address=/tesla.services/::

# --- 加载 web 维护的例外文件 ---
conf-dir=/etc/dnsmasq.d/,*.conf

# --- 杂项 ---
no-poll
no-negcache
domain-needed
bogus-priv
