# Tesla ISO - 例外放行列表
# 此文件由 web (cgi-bin/api.sh) 自动维护
# 每次添加/删除例外后整文件重写, 然后 kill -HUP dnsmasq 重载
#
# 默认两条系统例外, 不可在 web 上删除:
#   1. connman.vn.cloud.tesla.cn  : Tesla WiFi captive portal 验证, 不放行车机连不上 WiFi
#   2. nav-prd-maps.tesla.cn      : Tesla 中国导航后端, 不放行没有路径规划/路口放大图
#
# 用户后续可以通过 web 添加更多例外 (比如发现某个 tesla 子域是手机 App 状态查询用的)
# 添加的例外会写在下面 # USER EXCEPTIONS BELOW 标记之后
#
# 格式: server=/<完整域名>/<上游 DNS>
# dnsmasq 的最长后缀匹配规则保证这里的具体子域会胜过 dnsmasq.conf 里 tesla 根域的 sinkhole

# === SYSTEM EXCEPTIONS (DO NOT EDIT) ===
server=/connman.vn.cloud.tesla.cn/114.114.114.114
server=/nav-prd-maps.tesla.cn/114.114.114.114
# nav-prd-maps 的 CNAME 上游, 必须同时放行否则导航偶发失效
server=/maps-cn-prd.go.tesla.services/114.114.114.114

# === USER EXCEPTIONS BELOW ===
# (web 添加的例外会插到这一行下面)
