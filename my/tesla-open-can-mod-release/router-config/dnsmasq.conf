# Tesla WiFi DNS - whitelist mode + logging
no-resolv
no-poll
log-queries
log-facility=/tmp/dns.log

# Tesla sinkhole - all tesla domains -> 127.0.0.1
# connman.vn.cloud.tesla.cn is bypassed via /etc/hosts (longest match wins)
address=/tesla.cn/127.0.0.1
address=/tesla.com/127.0.0.1
address=/teslamotors.com/127.0.0.1
address=/tesla.services/127.0.0.1

# Exception: nav-prd-maps allowed (longest match wins over address=/tesla.cn/)
server=/nav-prd-maps.tesla.cn/114.114.114.114

# Non-Tesla suffix whitelist (dnsmasq's server=/X/ covers X and *.X)
server=/ntsc.ac.cn/114.114.114.114
server=/aliyun.com/114.114.114.114
server=/baidu.com/114.114.114.114
server=/baidu.cn/114.114.114.114
server=/bdimg.com/114.114.114.114
server=/bdstatic.com/114.114.114.114
server=/bdycdn.cn/114.114.114.114
server=/bcebos.com/114.114.114.114
server=/qq.com/114.114.114.114
server=/tencent.com/114.114.114.114
server=/tencentmusic.com/114.114.114.114
server=/gtimg.cn/114.114.114.114
server=/tencent-cloud.net/114.114.114.114
server=/weixin.com/114.114.114.114
server=/163.com/114.114.114.114
server=/126.net/114.114.114.114
server=/apple.com/114.114.114.114
