[env:feather_rp2040_can]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = adafruit_feather_can
framework = arduino
extra_scripts = pre:scripts/platformio_sync_ino_defines.py
board_build.core = earlephilhower
lib_deps = autowp/autowp-mcp2515
build_flags = -DDRIVER_MCP2515

[env:feather_m4_can]
platform = atmelsam
board = adafruit_feather_m4_can
framework = arduino
extra_scripts = pre:scripts/platformio_sync_ino_defines.py
lib_deps = adafruit/Adafruit CAN
build_flags = -DDRIVER_SAME51 -std=gnu++17
build_unflags = -std=gnu++11

[env:esp32_twai]
platform = espressif32
board = esp32dev
framework = arduino
extra_scripts = pre:scripts/platformio_sync_ino_defines.py
build_flags = -DDRIVER_TWAI -std=gnu++17
build_unflags = -std=gnu++11

[env:esp32_feather_v2_mcp2515]
platform = espressif32
board = adafruit_feather_esp32_v2
framework = arduino
extra_scripts = pre:scripts/platformio_sync_ino_defines.py
lib_deps = https://github.com/autowp/arduino-mcp2515
monitor_speed = 115200
build_flags = -DDRIVER_MCP2515 -DPIN_CAN_CS=14 -DPIN_CAN_INTERRUPT=32 -DPIN_LED=13 -std=gnu++17
build_unflags = -std=gnu++11

[env:lilygo_tcan485_hw3]
extends = env:esp32_twai
build_flags = ${env:esp32_twai.build_flags} -DTWAI_TX_PIN=GPIO_NUM_27 -DTWAI_RX_PIN=GPIO_NUM_26 -DPIN_LED=2
monitor_speed = 115200

[env:m5stack-atomic-can-base]
extends = env:esp32_twai
board = m5stack-atom
build_flags = ${env:esp32_twai.build_flags} -DPIN_LED=27 -DTWAI_TX_PIN=GPIO_NUM_22 -DTWAI_RX_PIN=GPIO_NUM_19
monitor_speed = 115200

[env:m5stack-atoms3-mini-can-base]
extends = env:esp32_twai
board = m5stack-atoms3
build_flags = ${env:esp32_twai.build_flags} -DPIN_LED=LED_BUILTIN -DTWAI_TX_PIN=GPIO_NUM_2 -DTWAI_RX_PIN=GPIO_NUM_1
monitor_speed = 115200

; Waveshare ESP32-S3-RS485-CAN industrial isolated module
; - ESP32-S3R8 (240MHz, 16MB flash, 8MB PSRAM)
; - TWAI internal CAN: TX=GPIO15, RX=GPIO16
; - Joins existing WiFi (STA) with static IP, also keeps AP for fallback
[env:waveshare_esp32s3_rs485_can]
extends = env:esp32_twai
board = esp32-s3-devkitc-1
build_flags = ${env:esp32_twai.build_flags}
  -DTWAI_TX_PIN=GPIO_NUM_15
  -DTWAI_RX_PIN=GPIO_NUM_16
  -DPIN_LED=2
  -DBOARD_HAS_PSRAM
  -DRUNTIME_HW_SWITCH
  -DWIFI_STA_ENABLE
  '-DWIFI_STA_SSID="YOUR_WIFI_SSID"'
  '-DWIFI_STA_PASS="YOUR_WIFI_PASSWORD"'
  -DWIFI_STA_STATIC_IP=2,2,2,2
  -DWIFI_STA_GATEWAY=2,2,2,1
  -DWIFI_STA_SUBNET=255,255,255,0
  -DWIFI_STA_DNS=2,2,2,1
  '-DWIFI_STA_HOSTNAME="tesla-canmod"'
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200

[env:native]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
test_ignore =
    test_native_bypass_tlssc_requirement
    test_native_nag
build_flags = -std=c++17 -DNATIVE_BUILD -DISA_SPEED_CHIME_SUPPRESS -DEMERGENCY_VEHICLE_DETECTION -DENHANCED_AUTOPILOT
test_filter = test_native_*

[env:native_bypass_tlssc_requirement]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DISA_SPEED_CHIME_SUPPRESS -DEMERGENCY_VEHICLE_DETECTION -DBYPASS_TLSSC_REQUIREMENT -DENHANCED_AUTOPILOT
test_filter = test_native_bypass_tlssc_requirement

[env:native_log_buffer]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD
test_filter = test_native_log_buffer

[env:native_nag]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DNAG_KILLER
test_filter = test_native_nag
