name: Bug report
description: Something is broken in the app itself
title: "[bug] <short description>"
labels: ["bug"]
body:
  - type: input
    id: app_version
    attributes:
      label: App version
      description: From Releases page or main menu (e.g. v2.4.0)
      placeholder: "v2.4.0"
    validations:
      required: true

  - type: dropdown
    id: hardware
    attributes:
      label: Hardware
      options:
        - Flipper Zero + Electronic Cats CAN Add-On
        - Flipper Zero + generic MCP2515 module
        - Flipper Zero + other (please specify)
        - ESP32 (PR #6 port)
    validations:
      required: true

  - type: input
    id: firmware
    attributes:
      label: Tesla firmware version (if applicable)
      placeholder: "2026.2.11"

  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: screen
    attributes:
      label: Screen output / counters
      description: What did the Flipper screen show? RX / TX / Err counts? Screenshot welcome.
